kind = "web"
previewPath = "/"
title = "Página de Upsell"
version = "1.0.0"
id = "artifacts/upsell-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18336

[services.development]
run = "pnpm --filter @workspace/upsell-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/upsell-page", "run", "build" ]
publicDir = "artifacts/upsell-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18336"
BASE_PATH = "/"
